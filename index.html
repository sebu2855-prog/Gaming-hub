<!DOCTYPE html>
<html>
<head>
    <title>Sebu YouTube Earnings</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        header {
            background: red;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            padding: 15px;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 15px 0;
            border-radius: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: red;
            border: none;
            color: white;
            border-radius: 10px;
        }

        li {
            background: #334155;
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<header>💰 Sebu YouTube Earnings</header>

<div class="container">

    <!-- LOGIN -->
    <div id="login">
        <div class="card">
            <h2>🔐 Login</h2>
            <input type="text" id="username" placeholder="Enter your name">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">

        <div class="card">
            <h2 id="welcome"></h2>
        </div>

        <div class="card">
            <h3>📹 Upload Video</h3>
            <input type="text" id="videoTitle" placeholder="Enter video title">
            <button onclick="upload()">Upload</button>
        </div>

        <div class="card">
            <h3>🎥 Your Videos</h3>
            <ul id="videoList"></ul>
        </div>

        <!-- VIDEO PLAYER -->
        <div class="card">
            <h3>▶️ Watch Video</h3>
            <iframe id="player" width="100%" height="200"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            frameborder="0" allowfullscreen>
            </iframe>
        </div>

        <div class="card">
            <h3>💸 Earnings</h3>
            <p>Total Earn: ₹<span id="money">0</span></p>
            <button onclick="earn()">Generate Earning</button>
        </div>

    </div>

</div>

<script>
    let money = 0;

    function login() {
        let name = document.getElementById("username").value;

        if(name === "") {
            alert("Enter your name!");
            return;
        }

        localStorage.setItem("user", name);

        document.getElementById("login").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");

        document.getElementById("welcome").innerText = "Welcome " + name + " 😎";
    }

    function playVideo(videoId) {
        let player = document.getElementById("player");
        player.src = "https://www.youtube.com/embed/" + videoId;
    }

    function upload() {
        let title = document.getElementById("videoTitle").value;

        if(title === "") {
            alert("Enter video title!");
            return;
        }

        let li = document.createElement("li");
        li.innerText = title;

        // click pe video change
        li.onclick = function() {
            playVideo("dQw4w9WgXcQ"); // yaha apna video ID daal sakte ho
        };

        document.getElementById("videoList").appendChild(li);
        document.getElementById("videoTitle").value = "";
    }

    function earn() {
        let random = Math.floor(Math.random() * 100);
        money += random;
        document.getElementById("money").innerText = money;
    }

    // Auto login
    window.onload = function() {
        let savedUser = localStorage.getItem("user");

        if(savedUser) {
            document.getElementById("login").classList.add("hidden");
            document.getElementById("dashboard").classList.remove("hidden");
            document.getElementById("welcome").innerText = "Welcome " + savedUser + " 😎";
        }
    }
</script>

</body>
</html>
