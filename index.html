<!DOCTYPE html>
<html>
<head>
  <title>Sebu YouTube Earnings</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      background: red;
      padding: 15px;
      text-align: center;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px 0;
      border-radius: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      background: red;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    li {
      background: #334155;
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    video {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>💰 Sebu YouTube Earnings</header>

<div class="container">

  <div class="card">
    <h2>Welcome Sebu 😎</h2>
  </div>

  <div class="card">
    <h3>📹 Upload Video</h3>

    <input type="text" id="title" placeholder="Enter video title">
    <br>

    <input type="file" id="file" accept="video/*">
    <br>

    <button onclick="uploadVideo()">Upload</button>
  </div>

  <div class="card">
    <h3>🎥 Your Videos</h3>
    <ul id="videoList"></ul>
  </div>

  <div class="card">
    <h3>▶️ Watch Video</h3>
    <video id="player" controls></video>
  </div>

</div>

<script>
let videos = [];

function uploadVideo() {
  let title = document.getElementById("title").value;
  let fileInput = document.getElementById("file");

  if (title === "") {
    alert("Title likho!");
    return;
  }

  if (fileInput.files.length === 0) {
    alert("Video select karo!");
    return;
  }

  let file = fileInput.files[0];
  let url = URL.createObjectURL(file);

  videos.push({ title: title, url: url });

  showVideos();

  // reset fields
  document.getElementById("title").value = "";
  fileInput.value = "";
}

function showVideos() {
  let list = document.getElementById("videoList");
  list.innerHTML = "";

  videos.forEach((video, index) => {
    let li = document.createElement("li");
    li.innerText = video.title;

    li.onclick = function() {
      document.getElementById("player").src = video.url;
    };

    list.appendChild(li);
  });
}
</script>

</body>
</html>
