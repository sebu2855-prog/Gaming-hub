
         <!DOCTYPE html>
<html>
<head>
  <title>Sebu YouTube Earnings</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      margin: 0;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      margin: 15px 0;
      border-radius: 15px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      background: red;
      color: white;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    li {
      background: #334155;
      margin: 5px 0;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>Welcome Sebu 😎</h2>

  <div class="card">
    <h3>📹 Upload Video</h3>
    <input type="text" id="title" placeholder="Enter video title">
    <input type="file" id="file">
    <br>
    <button onclick="uploadVideo()">Upload</button>
  </div>

  <div class="card">
    <h3>🎥 Your Videos</h3>
    <ul id="videoList"></ul>
  </div>

  <div class="card">
    <h3>▶️ Watch Video</h3>
    <video id="player" controls></video>
  </div>

</div>

<script>
  let videos = [];

  function uploadVideo() {
    let title = document.getElementById("title").value;
    let file = document.getElementById("file").files[0];

    if (!title || !file) {
      alert("Title aur video select karo!");
      return;
    }

    let url = URL.createObjectURL(file);

    videos.push({ title: title, url: url });

    showVideos();

    document.getElementById("title").value = "";
    document.getElementById("file").value = "";
  }

  function showVideos() {
    let list = document.getElementById("videoList");
    list.innerHTML = "";

    videos.forEach((video, index) => {
      let li = document.createElement("li");
      li.innerText = video.title;

      li.onclick = () => {
        document.getElementById("player").src = video.url;
      };

      list.appendChild(li);
    });
  }
</script>

</body>
</html>
